id: sne-ia-nearby-calibrators
title: Nearby Type Ia calibration-quality light curves
domain: [sne-ia, photometry]
status: proposed
science_question: Can synthetic Type Ia light curves reproduce nearby multi-band color and luminosity evolution in well-calibrated low-redshift samples?
upstream_catalogs:
  - csp-dr3
  - foundation
  - cfa
  - cnia002
  - tns
selection:
  summary: Build a nearby, calibration-quality light-curve set with explicit filter systems, redshifts, host associations, and source-specific quality flags.
  cuts:
    - Prefer spectroscopically classified normal Type Ia events for the first fixture set.
    - Preserve source-native quality flags and sample-membership labels.
    - Record filter passbands and zeropoint provenance before combining catalogs.
observables:
  - name: apparent_magnitude
    unit: mag
    description: Observed light-curve point in a named filter system.
  - name: flux
    unit: relative
    description: Flux value when the upstream catalog provides calibrated or relative fluxes.
  - name: phase_observer
    unit: day
    description: Observer-frame phase relative to reference epoch (Tmax).
  - name: phase_rest
    unit: day
    description: Rest-frame phase relative to reference epoch (Tmax), corrected for time dilation.
build_plan:
  planned_from:
    - observables/sne-ia/catalogs/csp-dr3.yaml
    - observables/sne-ia/catalogs/foundation.yaml
    - observables/sne-ia/catalogs/cfa.yaml
    - observables/sne-ia/catalogs/cnia002.yaml
    - observables/sne-ia/catalogs/tns.yaml
  requires_rebuild: false
caveats:
  - Cross-survey calibration should not be inferred silently.
  - Nearby samples may have targeted-survey selection biases.
next_actions:
  - Add CNIa0.02 and CfA normalization adapters.
  - Formalize filter cross-matching evidence for synthetic comparisons.
