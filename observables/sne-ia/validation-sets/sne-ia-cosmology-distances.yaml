id: sne-ia-cosmology-distances
title: Type Ia standardized-distance validation set
domain: [sne-ia, cosmology]
status: available
science_question: Can a simulation or synthetic-observable pipeline reproduce Type Ia standardized-distance distributions and residual structure after published cosmology analysis cuts?
upstream_catalogs:
  - pantheon-plus
selection:
  summary: Start from the public Pantheon+ / SH0ES data release and preserve the published sample membership, redshift fields, covariance, and light-curve metadata.
  cuts:
    - Use published Pantheon+ inclusion flags and covariance products.
    - Do not replace survey-specific calibration or standardization choices during the first milestone.
observables:
  - name: distance_modulus
    unit: mag
    description: Published standardized Type Ia distance modulus.
  - name: redshift
    unit: dimensionless
    description: Redshift field used by the published cosmology analysis.
  - name: distance_modulus_err
    unit: mag
    description: Total uncertainty (statistical and systematic) on distance modulus.
build_plan:
  planned_from:
    - observables/sne-ia/catalogs/pantheon-plus.yaml
  requires_rebuild: false
caveats:
  - This product validates cosmology-facing standardized distances, not raw explosion physics directly.
  - Component survey selection and calibration assumptions remain embedded until separately modeled.
next_actions:
  - Implement a Pantheon+ adapter with covariance-matrix support (Phase 2 extension).
  - Add known-value checks from the publication and release documentation.
